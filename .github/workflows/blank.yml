name: Update README

# Mengatur workflow untuk berjalan setiap 5 menit
on:
  schedule:
    - cron: "*/5 * * * *"

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
    # Langkah pertama, checkout repositori
    - uses: actions/checkout@v4

    # Langkah kedua, memperbarui README.md dengan konten baru
    - name: Update README
      run: |
        echo '
        ```json
        {
          "name": "Yogawan Aditya Pratama",
          "education": "University of Technology Yogyakarta",
          "interest": ["Bitcoin", "JKT48"],
          "skills": {
            "Graphic Designer": ["Figma", "CorelDraw"],
            "UI Designer": ["Figma", "Sketch"],
            "Front-End": ["Saas", "Tailwind (On-Going)", "ReactJS", "NextJS (On-Going)"],
            "Back-End": ["MonggoDB", "ExpressJS", "MySQL"]
          },
          "updated_at": "'$(date -u)'"
        }' > README.md

    # Langkah ketiga, commit perubahan ke repositori
    - name: Commit and push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add README.md
        git commit -m "Update README automatically"
        git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
